<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADIDAS SAMBA | STORA</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#000;
    color:#fff;
}

nav{
    background:#111;
    padding:25px;
    display:flex;
    justify-content:space-between;
}

.logo{
    font-size:32px;
    font-weight:bold;
}

nav a{
    color:white;
    text-decoration:none;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:50px 20px;
    display:flex;
    flex-wrap:wrap;
    gap:50px;
}

.gallery{
    flex:1;
}

.main-img{
    background:#111;
    padding:20px;
    border-radius:20px;
}

.main-img img{
    width:100%;
}

.thumbs{
    margin-top:20px;
    display:flex;
    gap:10px;
}

.thumbs img{
    width:80px;
    cursor:pointer;
    border-radius:10px;
}

.info{
    flex:1;
}

.info h1{
    font-size:48px;
}

.price{
    font-size:36px;
    margin:20px 0;
}

.stock{
    color:#00ff66;
    font-size:20px;
}

.warning{
    color:#ff4444;
    font-weight:bold;
    margin:20px 0;
}

.bio{
    margin:30px 0;
    color:#ccc;
    line-height:1.7;
}

.buy{
    padding:18px 40px;
    border:none;
    border-radius:40px;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>

<body>

<nav>
    <div class="logo">STORA</div>
    <a href="index.html">← Back</a>
</nav>

<div class="container">

    <div class="gallery">

        <div class="main-img">
            <img
            id="mainImage"
            src="ChatGPT Image Jul 4, 2026 at 06_11_16 PM.png">
        </div>

        <div class="thumbs">
            <img src="ChatGPT Image Jul 4, 2026 at 06_11_16 PM.png">
            <img src="ChatGPT Image Jul 4, 2026 at 06_11_16 PM.png">
            <img src="ChatGPT Image Jul 4, 2026 at 06_11_16 PM.png">
            <img src="ChatGPT Image Jul 4, 2026 at 06_11_16 PM.png">
        </div>

    </div>

    <div class="info">

        <h1>ADIDAS SAMBA</h1>

        <div class="price">
            Rs. 3,999
        </div>

        <div class="stock">
            🟢 AVAILABLE
        </div>

        <div class="warning">
            ⚠️ ONLY 5 LEFT IN STOCK
        </div>

        <p>
            🔥 27 people viewed this item today
        </p>

        <br>

        <h3>Colors</h3>

        <p>
            🟢 Green |
            🟤 Brown |
            ⚫ Black
        </p>

        <div class="bio">
            The Adidas Samba is one of the most iconic sneakers ever made.
            Built with premium materials, timeless design and exceptional comfort.
        </div>

        <button class="buy">
            BUY NOW
        </button>

    </div>

</div>

</body>
</html>

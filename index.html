<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STORA</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="intro">
    <h1>STORA</h1>
</div>

<nav>
    <div class="logo">STORA</div>

    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#products">Shoes</a></li>
        <li><a href="#contact">Contact</a></li>
    </ul>
</nav>

<section class="hero">
    <h1>MOVE WITH STYLE</h1>
    <p>Premium Shoes & Watches</p>
    <button>Explore Now</button>
</section>

<section class="products" id="products">

    <h2>Premium Shoes</h2>

    <div class="cards">

        <div class="samba-card"
             onclick="dropShoe()">

            <img
                src="samba.png"
                class="samba-img">

            <h3>ADIDAS SAMBA</h3>

            <p>Click to Experience</p>

        </div>

    </div>

</section>

<section class="about">

    <h2>About STORA</h2>

    <p>
        STORA is a premium luxury
        footwear brand.
    </p>

</section>

<section
    class="contact"
    id="contact">

    <h2>Contact</h2>

    <p>support@stora.com</p>

</section>

<footer>

    <h3>STORA</h3>

    <p>© 2026</p>

</footer>

<div
    id="dropScreen"
    class="drop-screen">

    <div class="splash"></div>

    <img
        src="samba.png"
        id="fallingShoe"
        class="falling-shoe">

</div>

<script src="script.js"></script>

</body>
</html>
